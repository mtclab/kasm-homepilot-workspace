name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "kasm_startup.sh"
      - "environment"
      - "config/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      hp_ref:
        description: "homepilot-v2 git ref to bake in (branch, tag, or SHA)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve homepilot ref
        id: hp
        run: |
          # On a published release, use the release tag as HP_REF so the
          # baked hp version matches the workspace release.  Manual dispatch
          # can override.  Otherwise fall back to main.
          if [ "${{ github.event_name }}" = "release" ]; then
            REF="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.hp_ref }}" ]; then
            REF="${{ inputs.hp_ref }}"
          else
            REF="main"
          fi
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Generate version
        id: version
        run: |
          VERSION="$(date -u +'%Y.%m.%d').${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            HP_REF=${{ steps.hp.outputs.ref }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        if: github.event_name != 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: github.event_name != 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ### Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            docker pull ghcr.io/${{ github.repository }}:latest
            ```

            ### homepilot-v2 ref baked in

            `HP_REF=${{ steps.hp.outputs.ref }}`

            To pin a specific homepilot version, trigger a manual build with `hp_ref` set to a tag or SHA.
